<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>추천도서 슬라이더</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --main: #c8602a; --dur: 0.5s; }
body { background: #f5f4f0; display: flex; justify-content: center; padding: 60px 20px; }

.slider-wrap { width: 860px; }

/* radio 숨김 */
input[type="radio"] { display: none; }

/* ── 슬라이더 영역 ── */
.slider-outer {
    position: relative;
    width: 100%;
    height: 340px;
    border-radius: 12px;
    overflow: hidden;
    background: #000;
}

/* 각 슬라이드: absolute로 겹쳐서 opacity로 전환 */
.slide {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 80px;
    font-weight: 800;
    color: rgba(255,255,255,0.85);
    opacity: 0;
    transition: opacity var(--dur) ease;
}

.slide:nth-child(1) { background: #c8602a; }
.slide:nth-child(2) { background: #4a90d9; }
.slide:nth-child(3) { background: #5ba85a; }
.slide:nth-child(4) { background: #9b59b6; }
.slide:nth-child(5) { background: #e67e22; }
.slide:nth-child(6) { background: #e74c3c; }
.slide:nth-child(7) { background: #1abc9c; }

/* radio checked → 해당 슬라이드 보임 */
#s1:checked ~ .slider-outer .slide:nth-child(1) { opacity: 1; }
#s2:checked ~ .slider-outer .slide:nth-child(2) { opacity: 1; }
#s3:checked ~ .slider-outer .slide:nth-child(3) { opacity: 1; }
#s4:checked ~ .slider-outer .slide:nth-child(4) { opacity: 1; }
#s5:checked ~ .slider-outer .slide:nth-child(5) { opacity: 1; }
#s6:checked ~ .slider-outer .slide:nth-child(6) { opacity: 1; }
#s7:checked ~ .slider-outer .slide:nth-child(7) { opacity: 1; }

/* ── 컨트롤 ── */
.slider-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
}

/* 버튼 공통: 기본 숨김 */
.btn-prev, .btn-next {
    display: none;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: #fff;
    border: 1px solid #e0ddd8;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    cursor: pointer;
    user-select: none;
    transition: background 0.2s, color 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.btn-prev:hover, .btn-next:hover {
    background: var(--main);
    color: #fff;
    border-color: var(--main);
}

/* 번호 */
.slider-info {
    font-size: 15px;
    font-weight: 600;
    color: #555;
    min-width: 60px;
    text-align: center;
}
.total { color: #aaa; font-weight: 400; }
.num { display: none; }

/* ── 상태별 버튼 + 번호 표시 ── */
#s1:checked ~ .slider-controls .prev-7 { display: flex; }
#s1:checked ~ .slider-controls .next-2 { display: flex; }
#s1:checked ~ .slider-controls .num-1  { display: inline; }

#s2:checked ~ .slider-controls .prev-1 { display: flex; }
#s2:checked ~ .slider-controls .next-3 { display: flex; }
#s2:checked ~ .slider-controls .num-2  { display: inline; }

#s3:checked ~ .slider-controls .prev-2 { display: flex; }
#s3:checked ~ .slider-controls .next-4 { display: flex; }
#s3:checked ~ .slider-controls .num-3  { display: inline; }

#s4:checked ~ .slider-controls .prev-3 { display: flex; }
#s4:checked ~ .slider-controls .next-5 { display: flex; }
#s4:checked ~ .slider-controls .num-4  { display: inline; }

#s5:checked ~ .slider-controls .prev-4 { display: flex; }
#s5:checked ~ .slider-controls .next-6 { display: flex; }
#s5:checked ~ .slider-controls .num-5  { display: inline; }

#s6:checked ~ .slider-controls .prev-5 { display: flex; }
#s6:checked ~ .slider-controls .next-7 { display: flex; }
#s6:checked ~ .slider-controls .num-6  { display: inline; }

#s7:checked ~ .slider-controls .prev-6 { display: flex; }
#s7:checked ~ .slider-controls .next-1 { display: flex; }
#s7:checked ~ .slider-controls .num-7  { display: inline; }

/* ★ 슬라이드 중 버튼 비활성화 */
@keyframes block {
    0%, 99% { pointer-events: none; opacity: 0.4; }
    100%     { pointer-events: auto; opacity: 1; }
}

#s1:checked ~ .slider-controls .prev-7,
#s1:checked ~ .slider-controls .next-2,
#s2:checked ~ .slider-controls .prev-1,
#s2:checked ~ .slider-controls .next-3,
#s3:checked ~ .slider-controls .prev-2,
#s3:checked ~ .slider-controls .next-4,
#s4:checked ~ .slider-controls .prev-3,
#s4:checked ~ .slider-controls .next-5,
#s5:checked ~ .slider-controls .prev-4,
#s5:checked ~ .slider-controls .next-6,
#s6:checked ~ .slider-controls .prev-5,
#s6:checked ~ .slider-controls .next-7,
#s7:checked ~ .slider-controls .prev-6,
#s7:checked ~ .slider-controls .next-1 {
    animation: block var(--dur) ease forwards;
}
</style>
</head>
<body>

<div class="slider-wrap">

    <input type="radio" id="s1" name="slide" checked>
    <input type="radio" id="s2" name="slide">
    <input type="radio" id="s3" name="slide">
    <input type="radio" id="s4" name="slide">
    <input type="radio" id="s5" name="slide">
    <input type="radio" id="s6" name="slide">
    <input type="radio" id="s7" name="slide">

    <!-- 슬라이더 -->
    <div class="slider-outer">
        <div class="slide">1</div>
        <div class="slide">2</div>
        <div class="slide">3</div>
        <div class="slide">4</div>
        <div class="slide">5</div>
        <div class="slide">6</div>
        <div class="slide">7</div>
    </div>

    <!-- 컨트롤 -->
    <div class="slider-controls">

        <!-- 이전 버튼 -->
        <label class="btn-prev prev-1" for="s1">&#8249;</label>
        <label class="btn-prev prev-2" for="s2">&#8249;</label>
        <label class="btn-prev prev-3" for="s3">&#8249;</label>
        <label class="btn-prev prev-4" for="s4">&#8249;</label>
        <label class="btn-prev prev-5" for="s5">&#8249;</label>
        <label class="btn-prev prev-6" for="s6">&#8249;</label>
        <label class="btn-prev prev-7" for="s7">&#8249;</label>

        <!-- 번호 -->
        <div class="slider-info">
            <span class="num num-1">1</span>
            <span class="num num-2">2</span>
            <span class="num num-3">3</span>
            <span class="num num-4">4</span>
            <span class="num num-5">5</span>
            <span class="num num-6">6</span>
            <span class="num num-7">7</span>
            <span class="total"> / 7</span>
        </div>

        <!-- 다음 버튼 -->
        <label class="btn-next next-1" for="s1">&#8250;</label>
        <label class="btn-next next-2" for="s2">&#8250;</label>
        <label class="btn-next next-3" for="s3">&#8250;</label>
        <label class="btn-next next-4" for="s4">&#8250;</label>
        <label class="btn-next next-5" for="s5">&#8250;</label>
        <label class="btn-next next-6" for="s6">&#8250;</label>
        <label class="btn-next next-7" for="s7">&#8250;</label>

    </div>
</div>

</body>
</html>
